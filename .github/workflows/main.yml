name: main

on:
  push:
    branches:
      - cluster
      - master
    paths:
      - '**.go'
      - 'go.*'
      - '.github/workflows/main.yml'
  pull_request:
    branches:
      - cluster
      - master
    paths:
      - '**.go'
      - 'go.*'
      - '.github/workflows/main.yml'

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

permissions: {}

jobs:
  lint:
    name: lint
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Go
        id: go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          cache: false
          go-version: stable

      - name: Cache Go artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/bin
            ~/go/pkg/mod
          key: go-artifacts-${{ runner.os }}-check-all-${{ steps.go.outputs.go-version }}-${{ hashFiles('go.sum', 'Makefile', 'app/**/Makefile') }}
          restore-keys: go-artifacts-${{ runner.os }}-check-all-

      - name: Run check-all
        run: |
          make check-all
          git diff --exit-code

  test:
    name: test
    needs: lint
    permissions:
      contents: read
    runs-on: ubuntu-latest

    strategy:
      matrix:
        scenario:
          - 'test-full'
          - 'test-full-386'
          - 'test-pure'

    steps:
      - name: Code checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Go
        id: go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          cache: false
          go-version: stable

      - name: Cache Go artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/bin
            ~/go/pkg/mod
          key: go-artifacts-${{ runner.os }}-${{ matrix.scenario }}-${{ steps.go.outputs.go-version }}-${{ hashFiles('go.sum', 'Makefile', 'app/**/Makefile') }}
          restore-keys: go-artifacts-${{ runner.os }}-${{ matrix.scenario }}-

      - name: Run tests
        run: GOGC=10 make ${{ matrix.scenario}}

  integration-test:
    name: integration-test
    needs: [lint, test]
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Go
        id: go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          cache: false
          go-version: stable

      - name: Cache Go artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/bin
            ~/go/pkg/mod
          key: go-artifacts-${{ runner.os }}-${{ matrix.scenario }}-${{ steps.go.outputs.go-version }}-${{ hashFiles('go.sum', 'Makefile', 'app/**/Makefile') }}
          restore-keys: go-artifacts-${{ runner.os }}-${{ matrix.scenario }}-

      - name: Run integration tests
        run: make integration-test
